<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gaussian Splatting Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }
        
        #viewer-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        .overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 14px;
            max-width: 350px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .status {
            margin-bottom: 10px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-indicator.loading {
            background: #ffa500;
            animation: pulse 1.5s infinite;
        }
        
        .status-indicator.ready {
            background: #00ff00;
        }
        
        .status-indicator.error {
            background: #ff0000;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .info {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #444;
            font-size: 12px;
        }
        
        .info p {
            margin: 4px 0;
            color: #aaa;
        }
        
        #loading-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            z-index: 50;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top-color: #0080ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="viewer-container"></div>
    
    <div class="overlay">
        <div class="status">
            <span class="status-indicator loading" id="status-indicator"></span>
            <span id="status-text">Waiting for reconstruction...</span>
        </div>
        
        <div class="info">
            <p id="point-count">Points: -</p>
            <p id="file-info">File: -</p>
            <p id="last-update">Last Update: -</p>
        </div>
    </div>
    
    <div id="loading-message">
        <div class="spinner"></div>
        <h2>Initializing Viewer...</h2>
        <p style="color: #888; margin-top: 10px;">Loading Three.js...</p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const statusIndicator = document.getElementById('status-indicator');
        const statusText = document.getElementById('status-text');
        const loadingMessage = document.getElementById('loading-message');
        const pointCount = document.getElementById('point-count');
        const fileInfo = document.getElementById('file-info');
        const lastUpdate = document.getElementById('last-update');
        const container = document.getElementById('viewer-container');
        
        let scene, camera, renderer, points;
        let currentFile = null;
        
        function initThreeJS() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
            camera.position.set(0, 0, 5);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            loadingMessage.style.display = 'none';
            animate();
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (points) {
                points.rotation.y += 0.003;
            }
            
            renderer.render(scene, camera);
        }
        
        async function parsePLY(buffer) {
            const decoder = new TextDecoder('ascii');
            const headerEnd = buffer.indexOf(10, buffer.indexOf('end_header'));
            const headerText = decoder.decode(buffer.slice(0, headerEnd));
            
            const vertexMatch = headerText.match(/element vertex (\d+)/);
            if (!vertexMatch) throw new Error('Invalid PLY: no vertex count');
            
            const vertexCount = parseInt(vertexMatch[1]);
            const isBinary = headerText.includes('format binary');
            
            let positions = new Float32Array(vertexCount * 3);
            let colors = new Float32Array(vertexCount * 3);
            
            if (isBinary) {
                const dataView = new DataView(buffer.buffer, headerEnd + 1);
                let offset = 0;
                
                for (let i = 0; i < vertexCount; i++) {
                    positions[i * 3] = dataView.getFloat32(offset, true);
                    positions[i * 3 + 1] = dataView.getFloat32(offset + 4, true);
                    positions[i * 3 + 2] = dataView.getFloat32(offset + 8, true);
                    
                    if (headerText.includes('property uchar red')) {
                        colors[i * 3] = dataView.getUint8(offset + 12) / 255.0;
                        colors[i * 3 + 1] = dataView.getUint8(offset + 13) / 255.0;
                        colors[i * 3 + 2] = dataView.getUint8(offset + 14) / 255.0;
                        offset += 15;
                    } else {
                        const height = positions[i * 3 + 1];
                        colors[i * 3] = 0.2 + height * 0.3;
                        colors[i * 3 + 1] = 0.5 + height * 0.2;
                        colors[i * 3 + 2] = 0.8 - height * 0.3;
                        offset += 12;
                    }
                }
            } else {
                const lines = decoder.decode(buffer.slice(headerEnd + 1)).trim().split('\n');
                
                for (let i = 0; i < Math.min(vertexCount, lines.length); i++) {
                    const parts = lines[i].trim().split(/\s+/).map(Number);
                    if (parts.length >= 3) {
                        positions[i * 3] = parts[0];
                        positions[i * 3 + 1] = parts[1];
                        positions[i * 3 + 2] = parts[2];
                        
                        if (parts.length >= 6) {
                            colors[i * 3] = parts[3] / 255.0;
                            colors[i * 3 + 1] = parts[4] / 255.0;
                            colors[i * 3 + 2] = parts[5] / 255.0;
                        } else {
                            const height = parts[1];
                            colors[i * 3] = 0.2 + height * 0.3;
                            colors[i * 3 + 1] = 0.5 + height * 0.2;
                            colors[i * 3 + 2] = 0.8 - height * 0.3;
                        }
                    }
                }
            }
            
            return { positions, colors, count: vertexCount };
        }
        
        async function loadPLYFile(path) {
            statusIndicator.className = 'status-indicator loading';
            statusText.textContent = `Loading ${path.split('/').pop()}...`;
            
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const arrayBuffer = await response.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);
                const { positions, colors, count } = await parsePLY(uint8Array);
                
                if (points) {
                    scene.remove(points);
                }
                
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                geometry.computeBoundingSphere();
                
                const material = new THREE.PointsMaterial({ 
                    size: 0.02, 
                    vertexColors: true,
                    sizeAttenuation: true
                });
                
                points = new THREE.Points(geometry, material);
                scene.add(points);
                
                if (geometry.boundingSphere) {
                    const radius = geometry.boundingSphere.radius;
                    camera.position.set(0, 0, radius * 2.5);
                }
                
                statusIndicator.className = 'status-indicator ready';
                statusText.textContent = `Viewing ${path.split('/').pop()}`;
                pointCount.textContent = `Points: ${count.toLocaleString()}`;
                
            } catch (error) {
                console.error('Error loading PLY:', error);
                statusIndicator.className = 'status-indicator error';
                statusText.textContent = 'Error loading file';
            }
        }
        
        async function checkForUpdates() {
            try {
                const response = await fetch('/api/latest');
                const data = await response.json();
                
                if (data.filename && data.path && data.filename !== currentFile) {
                    currentFile = data.filename;
                    fileInfo.textContent = `File: ${data.filename} (${formatBytes(data.size)})`;
                    lastUpdate.textContent = `Last Update: ${new Date(data.modified * 1000).toLocaleTimeString()}`;
                    
                    await loadPLYFile(data.path);
                }
            } catch (error) {
                if (currentFile === null) {
                    statusIndicator.className = 'status-indicator loading';
                    statusText.textContent = 'Waiting for reconstruction...';
                }
            }
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        initThreeJS();
        
        setInterval(checkForUpdates, 2000);
        checkForUpdates();
    </script>
</body>
</html>
